<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vision Assist — Phone Mic</title>
    <style>
        :root {
            --bg: #0f0f14;
            --card: #1a1a24;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--muted); font-size: 0.8rem; margin-bottom: 24px; }

        .status-bar {
            display: flex;
            gap: 16px;
            background: var(--card);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 400px;
        }

        .status-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--red);
            transition: background 0.3s;
        }
        .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* Main mic button */
        .mic-btn {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
            position: relative;
        }
        .mic-btn:active { transform: scale(0.95); }
        .mic-btn.active { border-color: var(--green); box-shadow: 0 0 40px var(--accent-glow); }
        .mic-btn.active .mic-icon { fill: var(--green); }
        .mic-btn .pulse {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
        }
        .mic-btn.active .pulse { animation: pulse 1.5s ease-out infinite; }

        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .mic-icon { width: 48px; height: 48px; fill: var(--accent); transition: fill 0.3s; }

        .btn-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; text-align: center; }

        /* Mute button — only visible when connected */
        .mute-btn {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 24px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .mute-btn.visible { display: flex; }
        .mute-btn.muted {
            border-color: var(--yellow);
            color: var(--yellow);
            background: rgba(245, 158, 11, 0.08);
        }
        .mute-btn:active { transform: scale(0.96); }

        .viz {
            width: 100%; max-width: 400px; height: 60px;
            background: var(--card); border-radius: 12px;
            margin-bottom: 16px; overflow: hidden;
        }
        .viz canvas { width: 100%; height: 100%; }

        .log-area {
            width: 100%; max-width: 400px;
            background: var(--card); border-radius: 12px;
            padding: 12px 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem; color: var(--muted);
            max-height: 150px; overflow-y: auto; line-height: 1.5;
        }

        .footer { margin-top: auto; padding-top: 20px; font-size: 0.7rem; color: #475569; }

        /* Settings panel */
        .settings-toggle {
            position: absolute; top: 20px; right: 20px;
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--card);
            border: 1px solid rgba(99, 102, 241, 0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; transition: all 0.3s; z-index: 10;
        }
        .settings-toggle:hover { border-color: var(--accent); }

        .settings-panel {
            display: none; width: 100%; max-width: 400px;
            background: var(--card); border-radius: 12px;
            padding: 16px 20px; margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        .settings-panel.open { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .settings-panel h3 { font-size: 0.85rem; margin-bottom: 12px; color: var(--accent); }

        .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .setting-row label { font-size: 0.75rem; color: var(--muted); min-width: 70px; }
        .setting-row input {
            flex: 1; background: var(--bg);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px; padding: 8px 12px;
            color: var(--text); font-size: 0.8rem; outline: none; transition: border-color 0.3s;
        }
        .setting-row input:focus { border-color: var(--accent); }

        .save-btn {
            width: 100%; padding: 8px;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            border: none; border-radius: 8px;
            color: white; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; margin-top: 4px; transition: opacity 0.3s;
        }
        .save-btn:active { opacity: 0.8; }

        .ai-name-display { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; text-align: center; }
        .ai-name-display strong { color: var(--accent); }
    </style>
</head>

<body>

    <div class="settings-toggle" onclick="toggleSettings()">⚙️</div>

    <h1>🎧 Vision Assist</h1>
    <p class="subtitle">Phone Mic — Bluetooth Headphones</p>
    <p class="ai-name-display" id="aiNameDisplay">AI: <strong id="aiNameLabel">Buddy</strong></p>

    <div class="settings-panel" id="settingsPanel">
        <h3>⚙️ Personalization</h3>
        <div class="setting-row">
            <label>AI Name</label>
            <input type="text" id="aiNameInput" placeholder="e.g. Buddy, Jarvis, Sage">
        </div>
        <div class="setting-row">
            <label>Your Name</label>
            <input type="text" id="userNameInput" placeholder="Your name">
        </div>
        <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    </div>

    <div class="status-bar">
        <div class="status-item"><div class="dot" id="wsDot"></div><span id="wsLabel">Server</span></div>
        <div class="status-item"><div class="dot" id="micDot"></div><span>Mic</span></div>
        <div class="status-item"><div class="dot" id="aiDot"></div><span>AI</span></div>
    </div>

    <div class="mic-btn" id="micBtn" onclick="toggleMic()">
        <div class="pulse"></div>
        <svg class="mic-icon" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </div>
    <p class="btn-label" id="btnLabel">Tap to connect &amp; start</p>

    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
        <span id="muteIcon">🎤</span>
        <span id="muteLabel">Mute</span>
    </button>

    <div class="viz"><canvas id="vizCanvas"></canvas></div>

    <div class="log-area" id="logArea">Waiting to start...<br></div>

    <div class="footer">Connect BT headphones first, then tap the mic button.</div>

    <script>
        // ---- Configuration ----
        const params   = new URLSearchParams(window.location.search);
        const TOKEN    = params.get('token') || '';
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host     = window.location.host;  // includes port if non-standard
        const WS_URL   = TOKEN
            ? `${protocol}//${host}/ws/phone?token=${encodeURIComponent(TOKEN)}`
            : `${protocol}//${host}/ws/phone`;

        const SAMPLE_RATE = 16000;

        // Protocol
        const MSG_AUDIO_IN  = 0x01;
        const MSG_AUDIO_OUT = 0x03;
        const MSG_STATUS    = 0x04;

        // ---- State ----
        let ws           = null;
        let audioCtx     = null;
        let micStream    = null;
        let workletNode  = null;
        let analyser     = null;
        let isActive     = false;   // WS + mic are running
        let isMuted      = false;   // mic captured but not sent
        let playbackCtx  = null;
        let nextPlayTime = 0;

        // ---- UI Elements ----
        const micBtn   = document.getElementById('micBtn');
        const btnLabel = document.getElementById('btnLabel');
        const muteBtn  = document.getElementById('muteBtn');
        const wsDot    = document.getElementById('wsDot');
        const micDot   = document.getElementById('micDot');
        const aiDot    = document.getElementById('aiDot');
        const logArea  = document.getElementById('logArea');
        const vizCanvas = document.getElementById('vizCanvas');
        const vizCtx   = vizCanvas.getContext('2d');

        // ---- Logging ----
        function addLog(msg) {
            const t = new Date().toLocaleTimeString('en-US', { hour12: false });
            logArea.innerHTML += `<span style="color:#6366f1">${t}</span> ${msg}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
            console.log(msg);
        }

        // ---- Audio Visualization ----
        function setupViz() {
            vizCanvas.width  = vizCanvas.offsetWidth * 2;
            vizCanvas.height = vizCanvas.offsetHeight * 2;
        }
        function drawViz() {
            if (!analyser) {
                vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
                requestAnimationFrame(drawViz);
                return;
            }
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);
            vizCtx.fillStyle = '#1a1a24';
            vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
            vizCtx.lineWidth   = 2;
            vizCtx.strokeStyle = isMuted ? '#f59e0b' : (isActive ? '#22c55e' : '#6366f1');
            vizCtx.beginPath();
            const sliceW = vizCanvas.width / data.length;
            let x = 0;
            for (let i = 0; i < data.length; i++) {
                const y = (data[i] / 128.0) * vizCanvas.height / 2;
                i === 0 ? vizCtx.moveTo(x, y) : vizCtx.lineTo(x, y);
                x += sliceW;
            }
            vizCtx.lineTo(vizCanvas.width, vizCanvas.height / 2);
            vizCtx.stroke();
            requestAnimationFrame(drawViz);
        }

        // ---- WebSocket ----
        function connectWS() {
            addLog('Connecting to server...');
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onclose = () => {
                wsDot.classList.remove('on');
                aiDot.classList.remove('on');
                addLog('Disconnected from server');
                if (isActive) setTimeout(connectWS, 3000);  // auto-reconnect
            };

            ws.onerror = () => addLog('WebSocket error');

            ws.onmessage = (event) => {
                if (!(event.data instanceof ArrayBuffer)) return;
                const arr = new Uint8Array(event.data);
                if (arr.length < 2) return;

                if (arr[0] === MSG_AUDIO_OUT) {
                    playAudio(arr.slice(1));
                    aiDot.classList.add('on');
                    setTimeout(() => aiDot.classList.remove('on'), 500);
                } else if (arr[0] === MSG_STATUS) {
                    addLog(`Server: ${new TextDecoder().decode(arr.slice(1))}`);
                }
            };
        }

        // Returns a promise that resolves when WS opens (or after 10s timeout)
        function waitForWsOpen() {
            return new Promise((resolve) => {
                if (ws && ws.readyState === WebSocket.OPEN) { resolve(true); return; }
                const onOpen  = () => { cleanup(); resolve(true);  };
                const onError = () => { cleanup(); resolve(false); };
                const timer   = setTimeout(() => { cleanup(); resolve(false); }, 10000);
                function cleanup() {
                    ws.removeEventListener('open',  onOpen);
                    ws.removeEventListener('error', onError);
                    clearTimeout(timer);
                }
                ws.addEventListener('open',  onOpen,  { once: true });
                ws.addEventListener('error', onError, { once: true });
            });
        }

        // ---- AudioWorklet mic capture ----
        // Processor code as a Blob to avoid needing a separate JS file
        const WORKLET_CODE = `
class MicProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (ch && ch.length > 0) {
      const int16 = new Int16Array(ch.length);
      for (let i = 0; i < ch.length; i++) {
        const s = Math.max(-1, Math.min(1, ch[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      this.port.postMessage(int16.buffer, [int16.buffer]);
    }
    return true;
  }
}
registerProcessor('mic-processor', MicProcessor);
`;

        async function startMic() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: SAMPLE_RATE,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                    }
                });

                audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });

                // Load worklet from Blob URL (no separate file needed)
                const blob      = new Blob([WORKLET_CODE], { type: 'application/javascript' });
                const workletUrl = URL.createObjectURL(blob);
                await audioCtx.audioWorklet.addModule(workletUrl);
                URL.revokeObjectURL(workletUrl);

                const source = audioCtx.createMediaStreamSource(micStream);

                // Visualizer
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                // AudioWorklet node — forwards PCM to WebSocket
                workletNode = new AudioWorkletNode(audioCtx, 'mic-processor');
                workletNode.port.onmessage = (e) => {
                    if (isMuted || !ws || ws.readyState !== WebSocket.OPEN) return;
                    const msg = new Uint8Array(1 + e.data.byteLength);
                    msg[0] = MSG_AUDIO_IN;
                    msg.set(new Uint8Array(e.data), 1);
                    ws.send(msg.buffer);
                };
                source.connect(workletNode);

                micDot.classList.add('on');
                addLog('Microphone active');
                return true;
            } catch (err) {
                addLog(`Mic error: ${err.message}`);
                return false;
            }
        }

        function stopMic() {
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (audioCtx)    { audioCtx.close();         audioCtx    = null; }
            if (micStream)   { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
            analyser = null;
            micDot.classList.remove('on');
        }

        // ---- Audio Playback (Gemini → BT headphones) ----
        function ensurePlaybackCtx() {
            if (!playbackCtx) {
                playbackCtx  = new AudioContext({ sampleRate: 24000 });
                nextPlayTime = playbackCtx.currentTime;
            }
            // Mobile Safari/Chrome can suspend an AudioContext when backgrounded.
            if (playbackCtx.state === 'suspended') {
                playbackCtx.resume().catch(() => {});
            }
            return playbackCtx;
        }

        function playAudio(pcmBytes) {
            const ctx = ensurePlaybackCtx();

            // Copy into a fresh, aligned ArrayBuffer.
            // `pcmBytes` is a Uint8Array slice whose byteOffset may be odd —
            // constructing Int16Array on it directly would throw on some browsers
            // and corrupt samples on others.
            const evenLen = pcmBytes.byteLength & ~1;
            if (evenLen === 0) return;
            const aligned = new Uint8Array(evenLen);
            aligned.set(pcmBytes.subarray(0, evenLen));
            const int16 = new Int16Array(aligned.buffer);

            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

            const buf = ctx.createBuffer(1, float32.length, 24000);
            buf.getChannelData(0).set(float32);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);

            const now = ctx.currentTime;
            if (nextPlayTime < now) nextPlayTime = now;
            src.start(nextPlayTime);
            nextPlayTime += buf.duration;
        }

        // ---- Toggle connect / disconnect ----
        async function toggleMic() {
            if (isActive) {
                isActive = false;
                micBtn.classList.remove('active');
                btnLabel.textContent = 'Tap to start';
                muteBtn.classList.remove('visible', 'muted');
                isMuted = false;
                stopMic();
                if (ws) { ws.close(); ws = null; }
                wsDot.classList.remove('on');
            } else {
                btnLabel.textContent = 'Connecting...';
                connectWS();
                const opened = await waitForWsOpen();

                if (!opened || ws.readyState !== WebSocket.OPEN) {
                    btnLabel.textContent = 'Connection failed — tap to retry';
                    addLog('Could not connect to server');
                    return;
                }
                wsDot.classList.add('on');

                const micOk = await startMic();
                if (!micOk) {
                    btnLabel.textContent = 'Mic access denied — tap to retry';
                    ws.close(); ws = null;
                    wsDot.classList.remove('on');
                    return;
                }

                isActive = true;
                micBtn.classList.add('active');
                btnLabel.textContent = 'Listening... tap to stop';
                muteBtn.classList.add('visible');
            }
        }

        // ---- Mute toggle (keeps WS + mic alive) ----
        function toggleMute() {
            isMuted = !isMuted;
            muteBtn.classList.toggle('muted', isMuted);
            document.getElementById('muteIcon').textContent = isMuted ? '🔇' : '🎤';
            document.getElementById('muteLabel').textContent = isMuted ? 'Unmute' : 'Mute';
            micDot.classList.toggle('on', !isMuted);
        }

        // ---- Init ----
        setupViz();
        drawViz();
        window.addEventListener('resize', setupViz);

        // Wake lock — re-acquire when the page comes back to the foreground
        let wakeLockSentinel = null;
        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try { wakeLockSentinel = await navigator.wakeLock.request('screen'); }
            catch (e) { /* user agent may deny while hidden */ }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (!wakeLockSentinel || wakeLockSentinel.released) requestWakeLock();
                if (playbackCtx && playbackCtx.state === 'suspended') {
                    playbackCtx.resume().catch(() => {});
                }
            }
        });
        requestWakeLock();

        // ---- Settings Panel ----
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        async function loadProfile() {
            try {
                const url = TOKEN ? `/api/profile?token=${encodeURIComponent(TOKEN)}` : '/api/profile';
                const res = await fetch(url);
                if (!res.ok) return;
                const p = await res.json();
                document.getElementById('aiNameInput').value  = p.ai_name   || '';
                document.getElementById('userNameInput').value = p.user_name || '';
                document.getElementById('aiNameLabel').textContent = p.ai_name || 'Buddy';
            } catch (e) {
                console.log('Could not load profile:', e);
            }
        }

        async function saveSettings() {
            const aiName   = document.getElementById('aiNameInput').value.trim();
            const userName = document.getElementById('userNameInput').value.trim();
            const body = {};
            if (aiName)   body.ai_name   = aiName;
            if (userName) body.user_name = userName;
            try {
                const url = TOKEN ? `/api/profile?token=${encodeURIComponent(TOKEN)}` : '/api/profile';
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('aiNameLabel').textContent = data.profile.ai_name || 'Buddy';
                    addLog('Settings saved');
                    toggleSettings();
                }
            } catch (e) {
                addLog('Failed to save settings');
            }
        }

        loadProfile();
    </script>
</body>
</html>
